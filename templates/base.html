<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marketplace</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand" href="/">Marketplace</a>
    <div class="ms-auto">
    
        {% if user.is_authenticated %}
          <span class="me-2 text-muted">Hola, {{ user.username }}</span>
          <a class="btn btn-primary me-2" href="{% url 'service_new' %}">Publicar</a>

          <form action="{% url 'logout' %}" method="post" class="d-inline">
            {% csrf_token %}
            <button class="btn btn-outline-secondary" type="submit">Salir</button>
          </form>
        {% else %}
          <a class="btn btn-outline-primary me-2" href="{% url 'login' %}">Entrar</a>
          <a class="btn btn-success" href="{% url 'signup' %}">Registrarse</a>
        {% endif %}

    </div>
  </div>
</nav>
<main class="container py-4">
  {% if messages %}
    <div class="mb-3">
      {% for m in messages %}
        <div class="alert alert-{{ m.tags }}">{{ m }}</div>
      {% endfor %}
    </div>
  {% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
