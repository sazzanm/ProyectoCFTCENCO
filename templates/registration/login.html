{% extends "base.html" %}
{% block content %}
<h3>Iniciar sesión</h3>
<form method="post" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
  <button class="btn btn-primary">Entrar</button>
  <a class="btn btn-light" href="{% url 'signup' %}">Crear cuenta</a>
</form>
{% endblock %}
