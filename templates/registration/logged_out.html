{% extends "base.html" %}
{% block title %}Sesión Cerrada — Marketplace Digital{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card text-center">
    <div class="auth-icon" style="background:linear-gradient(135deg, var(--gray-500), var(--gray-700));">
      <i class="bi bi-box-arrow-right"></i>
    </div>
    <h3>¡Hasta pronto!</h3>
    <p class="auth-subtitle">Has cerrado sesión correctamente.</p>
    <div class="d-flex gap-2 justify-content-center mt-3">
      <a class="btn btn-mk-primary" href="{% url 'home' %}">
        <i class="bi bi-house me-1"></i> Volver al inicio
      </a>
      <a class="btn btn-mk-outline" href="{% url 'login' %}">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar de nuevo
      </a>
    </div>
  </div>
</div>
{% endblock %}
